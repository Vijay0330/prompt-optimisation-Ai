services:
  - type: web
    name: prompt-intelligence-backend
    env: python
    # Python 3.11 has pre-built wheels for ALL our dependencies.
    # Python 3.14 (Render's default latest) does NOT have wheels for
    # pydantic-core, hnswlib, tokenizers etc — forces Rust/C++ compilation
    # which fails on Render's read-only build filesystem.
    pythonVersion: "3.11.9"
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: AI
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ENV
        value: production
      - key: HF_TOKEN
        sync: false
      - key: HF_USERNAME
        sync: false
      - key: HF_MODEL_NAME
        value: prompt-intelligence-assistant
      - key: BASE_MODEL
        value: google/flan-t5-base
      - key: AUTO_TRAIN_THRESHOLD
        value: "100"
