services:
  - type: web
    name: prompt-intelligence-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── AI ─────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      # ── MongoDB ────────────────────────────────────────────────────────
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: AI
      # ── JWT ────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      # ── CORS — set to your Vercel URL after first deploy ───────────────
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://your-app.vercel.app
      # ── App ────────────────────────────────────────────────────────────
      - key: ENV
        value: production
      # ── Phase 4: HuggingFace ───────────────────────────────────────────
      - key: HF_TOKEN
        sync: false
      - key: HF_USERNAME
        sync: false
      - key: HF_MODEL_NAME
        value: prompt-intelligence-assistant
      - key: BASE_MODEL
        value: google/flan-t5-base
      - key: AUTO_TRAIN_THRESHOLD
        value: "100"
      # ── Phase 5: RAG ───────────────────────────────────────────────────
      # ChromaDB runs embedded — no extra service needed
      # chroma_db/ folder is created at runtime and is ephemeral on Render free tier
      # Knowledge base is re-seeded on every cold start (takes ~30s)
